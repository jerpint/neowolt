<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>calorie tracker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f1923;
    --surface: #16222e;
    --border: #1e3048;
    --accent: #7ec89a;
    --accent2: #5ba87e;
    --text: #cdd9e5;
    --muted: #5a7a96;
    --red: #e07070;
    --yellow: #e0c870;
  }
  body { background: var(--bg); color: var(--text); font-family: 'SF Mono','Fira Code','Courier New',monospace; min-height: 100vh; padding: 0 0 60px; }

  .topbar { padding: 20px 24px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: baseline; gap: 12px; }
  .topbar h1 { font-size: 1rem; color: var(--accent); letter-spacing: .08em; }
  .topbar .date { font-size: .75rem; color: var(--muted); }

  .container { max-width: 520px; margin: 0 auto; padding: 28px 20px; }

  /* Goal ring */
  .goal-section { text-align: center; margin-bottom: 32px; }
  .ring-wrap { position: relative; width: 160px; height: 160px; margin: 0 auto 16px; }
  svg.ring { transform: rotate(-90deg); }
  .ring-bg { fill: none; stroke: var(--border); stroke-width: 10; }
  .ring-fill { fill: none; stroke-width: 10; stroke-linecap: round; transition: stroke-dashoffset .5s ease, stroke .3s ease; }
  .ring-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); text-align: center; }
  .ring-cal { font-size: 1.8rem; font-weight: 700; color: var(--text); line-height: 1; }
  .ring-label { font-size: .65rem; color: var(--muted); letter-spacing: .1em; margin-top: 4px; }
  .ring-remain { font-size: .8rem; color: var(--muted); }

  /* Goal setter */
  .goal-edit { display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 8px; }
  .goal-edit label { font-size: .72rem; color: var(--muted); }
  .goal-edit input { background: var(--surface); border: 1px solid var(--border); color: var(--text); font-family: inherit; font-size: .8rem; width: 70px; padding: 4px 8px; border-radius: 4px; text-align: center; }
  .goal-edit input:focus { outline: none; border-color: var(--accent); }

  /* Quick add */
  .section-label { font-size: .65rem; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
  .quick-grid { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 24px; }
  .quick-btn { background: var(--surface); border: 1px solid var(--border); color: var(--text); font-family: inherit; font-size: .72rem; padding: 6px 10px; border-radius: 4px; cursor: pointer; transition: border-color .15s, color .15s; white-space: nowrap; }
  .quick-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* Add form */
  .add-form { display: flex; gap: 8px; margin-bottom: 28px; }
  .add-form input { background: var(--surface); border: 1px solid var(--border); color: var(--text); font-family: inherit; font-size: .82rem; padding: 10px 12px; border-radius: 4px; flex: 1; }
  .add-form input:focus { outline: none; border-color: var(--accent); }
  .add-form input::placeholder { color: var(--muted); }
  .cal-input { width: 90px !important; flex: none !important; text-align: center; }
  .add-btn { background: var(--accent); border: none; color: #0f1923; font-family: inherit; font-size: .82rem; font-weight: 700; padding: 10px 16px; border-radius: 4px; cursor: pointer; transition: background .15s; white-space: nowrap; }
  .add-btn:hover { background: var(--accent2); }

  /* Log */
  .log { display: flex; flex-direction: column; gap: 6px; }
  .log-item { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 10px 14px; display: flex; align-items: center; gap: 12px; animation: slideIn .2s ease; }
  @keyframes slideIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
  .log-meal { font-size: .65rem; letter-spacing: .08em; padding: 2px 6px; border-radius: 3px; border: 1px solid; text-transform: uppercase; }
  .meal-breakfast { color: #e0c870; border-color: #e0c87055; background: #e0c87011; }
  .meal-lunch     { color: #7ec89a; border-color: #7ec89a55; background: #7ec89a11; }
  .meal-dinner    { color: #7ab4e0; border-color: #7ab4e055; background: #7ab4e011; }
  .meal-snack     { color: #c87ebc; border-color: #c87ebc55; background: #c87ebc11; }
  .log-name { flex: 1; font-size: .85rem; }
  .log-cal { font-size: .9rem; color: var(--accent); font-weight: 600; min-width: 50px; text-align: right; }
  .log-del { background: none; border: none; color: var(--muted); font-size: 1rem; cursor: pointer; padding: 0 2px; line-height: 1; transition: color .15s; }
  .log-del:hover { color: var(--red); }
  .log-empty { color: var(--muted); font-size: .82rem; text-align: center; padding: 20px 0; }

  /* Macro pills */
  .macro-row { display: flex; gap: 8px; margin-bottom: 24px; }
  .macro { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 8px 12px; flex: 1; text-align: center; }
  .macro-val { font-size: 1rem; font-weight: 600; color: var(--text); }
  .macro-lbl { font-size: .62rem; color: var(--muted); letter-spacing: .08em; text-transform: uppercase; margin-top: 2px; }

  /* Meal selector */
  .meal-select { background: var(--surface); border: 1px solid var(--border); color: var(--muted); font-family: inherit; font-size: .72rem; padding: 10px 8px; border-radius: 4px; cursor: pointer; }
  .meal-select:focus { outline: none; border-color: var(--accent); }

  .clear-btn { background: none; border: 1px solid var(--border); color: var(--muted); font-family: inherit; font-size: .72rem; padding: 6px 12px; border-radius: 4px; cursor: pointer; width: 100%; margin-top: 16px; transition: border-color .15s, color .15s; }
  .clear-btn:hover { border-color: var(--red); color: var(--red); }
</style>
</head>
<body>

<div class="topbar">
  <h1>calorie tracker</h1>
  <span class="date" id="dateLabel"></span>
</div>

<div class="container">

  <!-- Ring -->
  <div class="goal-section">
    <div class="ring-wrap">
      <svg class="ring" width="160" height="160" viewBox="0 0 160 160">
        <circle class="ring-bg" cx="80" cy="80" r="68"/>
        <circle class="ring-fill" id="ringFill" cx="80" cy="80" r="68"/>
      </svg>
      <div class="ring-center">
        <div class="ring-cal" id="totalCal">0</div>
        <div class="ring-label">kcal</div>
      </div>
    </div>
    <div class="ring-remain" id="remainText">2000 remaining</div>
    <div class="goal-edit">
      <label>goal</label>
      <input type="number" id="goalInput" value="2000" min="500" max="5000">
      <label>kcal</label>
    </div>
  </div>

  <!-- Macros summary -->
  <div class="macro-row">
    <div class="macro"><div class="macro-val" id="mealCount">0</div><div class="macro-lbl">items</div></div>
    <div class="macro"><div class="macro-val" id="avgCal">—</div><div class="macro-lbl">avg / item</div></div>
    <div class="macro"><div class="macro-val" id="pctGoal">0%</div><div class="macro-lbl">of goal</div></div>
  </div>

  <!-- Quick add -->
  <div class="section-label">quick add</div>
  <div class="quick-grid" id="quickGrid"></div>

  <!-- Add form -->
  <div class="add-form">
    <select class="meal-select" id="mealSelect">
      <option value="breakfast">breakfast</option>
      <option value="lunch" selected>lunch</option>
      <option value="dinner">dinner</option>
      <option value="snack">snack</option>
    </select>
    <input type="text" id="foodInput" placeholder="food item" autocomplete="off">
    <input type="number" id="calInput" class="cal-input" placeholder="kcal" min="0" max="5000">
    <button class="add-btn" onclick="addItem()">add</button>
  </div>

  <!-- Log -->
  <div class="section-label">today's log</div>
  <div class="log" id="log"></div>

  <button class="clear-btn" onclick="clearDay()">clear today</button>

</div>

<script>
  const QUICK = [
    { name: 'banana', cal: 90 },
    { name: 'coffee', cal: 5 },
    { name: 'eggs ×2', cal: 140 },
    { name: 'oatmeal', cal: 150 },
    { name: 'apple', cal: 80 },
    { name: 'chicken breast', cal: 165 },
    { name: 'rice (1 cup)', cal: 200 },
    { name: 'salad', cal: 120 },
    { name: 'avocado', cal: 160 },
    { name: 'protein bar', cal: 200 },
    { name: 'greek yogurt', cal: 130 },
    { name: 'almonds (30g)', cal: 180 },
  ];

  let items = [];
  let goal = 2000;

  const todayKey = () => new Date().toISOString().split('T')[0];

  function load() {
    const key = todayKey();
    const saved = localStorage.getItem('wolt-calories-' + key);
    items = saved ? JSON.parse(saved) : [];
    const savedGoal = localStorage.getItem('wolt-cal-goal');
    if (savedGoal) goal = parseInt(savedGoal);
    document.getElementById('goalInput').value = goal;
  }

  function save() {
    localStorage.setItem('wolt-calories-' + todayKey(), JSON.stringify(items));
    localStorage.setItem('wolt-cal-goal', goal);
  }

  function addItem(name, cal, meal) {
    const n = name || document.getElementById('foodInput').value.trim();
    const c = parseInt(cal || document.getElementById('calInput').value);
    const m = meal || document.getElementById('mealSelect').value;
    if (!n || !c || c <= 0) return;
    items.push({ id: Date.now(), name: n, cal: c, meal: m });
    document.getElementById('foodInput').value = '';
    document.getElementById('calInput').value = '';
    save();
    render();
  }

  function removeItem(id) {
    items = items.filter(i => i.id !== id);
    save();
    render();
  }

  function clearDay() {
    if (!confirm('Clear today\'s log?')) return;
    items = [];
    save();
    render();
  }

  function render() {
    const total = items.reduce((s, i) => s + i.cal, 0);
    const pct = Math.min(total / goal, 1);
    const circumference = 2 * Math.PI * 68;

    // Ring
    const fill = document.getElementById('ringFill');
    fill.style.strokeDasharray = circumference;
    fill.style.strokeDashoffset = circumference * (1 - pct);
    fill.style.stroke = pct >= 1 ? '#e07070' : pct > .8 ? '#e0c870' : '#7ec89a';

    document.getElementById('totalCal').textContent = total.toLocaleString();
    const remain = goal - total;
    document.getElementById('remainText').textContent =
      remain >= 0 ? remain.toLocaleString() + ' remaining' : Math.abs(remain).toLocaleString() + ' over goal';
    document.getElementById('remainText').style.color =
      remain < 0 ? '#e07070' : remain < 200 ? '#e0c870' : '#5a7a96';

    // Stats
    document.getElementById('mealCount').textContent = items.length;
    document.getElementById('avgCal').textContent = items.length ? Math.round(total / items.length) : '—';
    document.getElementById('pctGoal').textContent = Math.round(pct * 100) + '%';

    // Log
    const log = document.getElementById('log');
    if (items.length === 0) {
      log.innerHTML = '<div class="log-empty">nothing logged yet</div>';
      return;
    }
    const order = ['breakfast','lunch','dinner','snack'];
    const sorted = [...items].sort((a,b) => order.indexOf(a.meal) - order.indexOf(b.meal));
    log.innerHTML = sorted.map(i => `
      <div class="log-item">
        <span class="log-meal meal-${i.meal}">${i.meal}</span>
        <span class="log-name">${escHtml(i.name)}</span>
        <span class="log-cal">${i.cal}</span>
        <button class="log-del" onclick="removeItem(${i.id})" title="remove">×</button>
      </div>
    `).join('');
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // Quick buttons
  const qg = document.getElementById('quickGrid');
  QUICK.forEach(q => {
    const btn = document.createElement('button');
    btn.className = 'quick-btn';
    btn.textContent = q.name + ' · ' + q.cal;
    btn.onclick = () => {
      const meal = document.getElementById('mealSelect').value;
      addItem(q.name, q.cal, meal);
    };
    qg.appendChild(btn);
  });

  // Goal input
  document.getElementById('goalInput').addEventListener('change', e => {
    goal = Math.max(500, parseInt(e.target.value) || 2000);
    e.target.value = goal;
    save();
    render();
  });

  // Enter to add
  document.getElementById('calInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') addItem();
  });
  document.getElementById('foodInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('calInput').focus();
  });

  // Date label
  document.getElementById('dateLabel').textContent =
    new Date().toLocaleDateString('en-CA', { weekday:'long', month:'long', day:'numeric' });

  load();
  render();
</script>
</body>
</html>
